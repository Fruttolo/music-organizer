<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Music Organizer</title>
<style>
  /* ── Reset & base ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #111318;
    --surface:   #1c1f26;
    --surface2:  #252930;
    --border:    #2e3340;
    --accent:    #6c63ff;
    --accept:    #22c55e;
    --skip:      #ef4444;
    --star:      #f59e0b;
    --text:      #e4e6f0;
    --muted:     #7a8099;
    --radius:    18px;
    --card-w:    min(420px, 92vw);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
  }

  /* ── Top bar ──────────────────────────────────────────────────────── */
  header {
    width: 100%;
    max-width: 520px;
    padding: 16px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }

  .stats {
    display: flex;
    gap: 12px;
    font-size: .78rem;
    color: var(--muted);
  }

  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    white-space: nowrap;
  }
  .stat-chip .val { color: var(--text); font-weight: 600; }

  /* ── Progress bar ─────────────────────────────────────────────────── */
  .progress-wrap {
    width: 100%;
    max-width: 520px;
    padding: 0 20px 14px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── Card stack area ──────────────────────────────────────────────── */
  .deck {
    position: relative;
    width: var(--card-w);
    height: min(580px, 85svh);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Card ─────────────────────────────────────────────────────────── */
  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    cursor: grab;
    touch-action: none;
    transition: box-shadow .15s;
    will-change: transform;
    box-shadow: 0 8px 32px #0006;
    overflow: hidden;
  }
  .card:active { cursor: grabbing; }

  /* swipe overlay labels */
  .card .lbl-accept,
  .card .lbl-skip {
    position: absolute;
    top: 22px;
    font-size: 1.4rem;
    font-weight: 800;
    border: 3px solid;
    border-radius: 10px;
    padding: 4px 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .1s;
    letter-spacing: 1px;
  }
  .card .lbl-accept { left: 20px;  color: var(--accept); border-color: var(--accept); transform: rotate(-15deg); }
  .card .lbl-skip   { right: 20px; color: var(--skip);   border-color: var(--skip);   transform: rotate(15deg); }
  .card .lbl-star   { left: 50%; top: 22px; transform: translateX(-50%) rotate(0deg); color: var(--star); border-color: var(--star); }

  /* ── File name row ────────────────────────────────────────────────── */
  .card-filename {
    font-size: .82rem;
    color: var(--muted);
    word-break: break-all;
  }

  /* ── Album art placeholder ────────────────────────────────────────── */
  .art {
    width: 96px;
    height: 96px;
    background: var(--surface2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    display: block;
  }
  .art .art-spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 12px;
  }
  .art .art-spinner .spinner {
    width: 20px; height: 20px;
    border-width: 2px;
  }

  .card-head { display: flex; gap: 14px; align-items: flex-start; }

  .card-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .card-meta .song-title {
    font-size: 1.2rem; font-weight: 700;
    word-break: break-word;
  }
  .card-meta .song-artist {
    font-size: .95rem; color: var(--muted);
    word-break: break-word;
  }
  .card-meta .song-album {
    font-size: .85rem; color: var(--muted);
    word-break: break-word;
  }

  /* ── Score badge ──────────────────────────────────────────────────── */
  .badge {
    display: inline-block;
    font-size: .7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    margin-top: 4px;
  }
  .badge-acoustid { background: #1e40af33; color: #93c5fd; border: 1px solid #1e40af66; }
  .badge-existing { background: #78350f33; color: #fcd34d; border: 1px solid #78350f66; }
  .badge-none     { background: #7f1d1d33; color: #fca5a5; border: 1px solid #7f1d1d66; }

  /* ── Existing tags comparison ─────────────────────────────────────── */
  .tags-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: .82rem;
  }
  .tags-section .section-lbl {
    font-size: .7rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .8px;
    margin-bottom: 6px;
  }
  .tags-grid { display: grid; grid-template-columns: 60px 1fr; gap: 2px 8px; }
  .tags-grid .k { color: var(--muted); }
  .tags-grid .v { font-weight: 500; word-break: break-word; }

  /* ── Card top row ─────────────────────────────────────────────────── */
  .card-top-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .card-top-meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── Tags comparison (2-col) ──────────────────────────────────────── */
  .tags-compare {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .tags-col {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .tags-col-prop {
    border-color: #4c3f99;
    background: #1a1c2e;
  }

  .col-header {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tags-col-prop .col-header { color: #a78bfa; }

  .tag-row {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    font-size: .8rem;
  }

  .tag-row .k {
    color: var(--muted);
    flex-shrink: 0;
    font-size: .7rem;
    width: 34px;
  }

  .tag-row .v {
    flex: 1;
    min-width: 0;
    font-weight: 500;
    word-break: break-word;
  }

  /* ── Copy button ──────────────────────────────────────────────────── */
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 3px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0.55;
    transition: opacity .15s, color .15s;
    display: flex;
    align-items: center;
  }
  .copy-btn:hover { opacity: 1; color: var(--accent); }
  .copy-btn.copied { color: var(--accept); opacity: 1; }

  /* ── Path rows ────────────────────────────────────────────────────── */
  .path-row {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: .74rem;
    flex-shrink: 0;
    min-width: 0;
  }

  .path-lbl {
    font-size: .62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .path-val {
    flex: 1;
    min-width: 0;
    word-break: break-all;
    color: var(--text);
    opacity: 0.8;
    font-family: 'Consolas', 'SF Mono', monospace;
    font-size: .72rem;
  }

  .path-row.path-proposed {
    border-color: #4c3f99;
    background: #1a1c2e;
  }

  .path-row.path-proposed .path-lbl { color: #a78bfa; }

  /* ── Audio player ─────────────────────────────────────────────────── */
  .player-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
  }

  .play-btn {
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 1rem;
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .play-btn:hover { background: #5850e8; }

  .waveform-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .audio-seek {
    width: 100%;
    height: 4px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .audio-time {
    font-size: .7rem;
    color: var(--muted);
    text-align: right;
  }

  /* spacer to push player to bottom */
  .flex-spacer { flex: 1; }

  /* ── Action buttons ───────────────────────────────────────────────── */
  .actions {
    width: var(--card-w);
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 16px 0 24px;
  }

  .btn-action {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s, box-shadow .12s;
    box-shadow: 0 4px 16px #0004;
  }
  .btn-action:hover { transform: scale(1.12); box-shadow: 0 6px 24px #0006; }
  .btn-action:active { transform: scale(.96); }

  .btn-skip   { background: #1f1215; color: var(--skip);   border: 2px solid var(--skip); }
  .btn-accept { background: #0f1f15; color: var(--accept); border: 2px solid var(--accept); }
  .btn-star   { background: #1f1708; color: var(--star);   border: 2px solid var(--star); font-size: 1.5rem; }
  .btn-reset  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: .95rem; width: auto; border-radius: 8px; padding: 0 16px; font-size: .82rem; }

  /* ── Empty / loading states ───────────────────────────────────────── */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: 100%;
    text-align: center;
    padding: 20px;
  }
  .state-screen .icon { font-size: 3rem; }
  .state-screen h2 { font-size: 1.2rem; }
  .state-screen p  { font-size: .88rem; color: var(--muted); max-width: 280px; }

  /* spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* swipe animation */
  @keyframes flyRight {
    to { transform: translateX(120vw) rotate(25deg); opacity: 0; }
  }
  @keyframes flyLeft {
    to { transform: translateX(-120vw) rotate(-25deg); opacity: 0; }
  }
  @keyframes flyUp {
    to { transform: translateY(-120vh) scale(.8); opacity: 0; }
  }
  .fly-right { animation: flyRight .35s ease-in forwards; }
  .fly-left  { animation: flyLeft  .35s ease-in forwards; }
  .fly-up    { animation: flyUp    .4s  ease-in forwards; }

  /* star burst on the button */
  @keyframes starPop {
    0%   { transform: scale(1); box-shadow: 0 4px 16px #0004; }
    40%  { transform: scale(1.35); box-shadow: 0 0 28px 6px #f59e0b66; }
    100% { transform: scale(1); box-shadow: 0 4px 16px #0004; }
  }
  .btn-star.burst { animation: starPop .45s ease; }

  /* keyboard hints */
  .hints {
    font-size: .72rem;
    color: var(--muted);
    padding-bottom: 12px;
    display: flex;
    gap: 16px;
  }
  .hints kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
  }

  /* skip badge on card */
  .badge-was-skipped {
    background: #4c1d9533;
    color: #c4b5fd;
    border: 1px solid #4c1d9566;
    font-size: .7rem; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
    align-self: flex-start;
  }

  /* ── Manual search button (in proposed col header) ────────────────── */
  .btn-manual-search {
    background: none;
    border: none;
    cursor: pointer;
    font-size: .82rem;
    padding: 0 3px;
    line-height: 1;
    opacity: 0.55;
    transition: opacity .15s;
    margin-left: 4px;
    vertical-align: middle;
  }
  .btn-manual-search:hover { opacity: 1; }

  /* ── Manual search modal ──────────────────────────────────────────── */
  .search-modal-overlay {
    position: fixed;
    inset: 0;
    background: #000b;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .search-modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .search-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 26px 24px;
    width: min(440px, 94vw);
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 16px 48px #0009;
  }
  .search-modal h3 { font-size: 1.05rem; font-weight: 700; }
  .search-field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .search-field label {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .9px;
    color: var(--muted);
  }
  .search-field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: .95rem;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .search-field input:focus { border-color: var(--accent); }
  .search-modal-actions { display: flex; gap: 10px; }
  .btn-modal-search {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    color: #fff;
    font-size: .92rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-modal-search:hover { background: #5850e8; }
  .btn-modal-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 18px;
    color: var(--muted);
    font-size: .92rem;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-modal-cancel:hover { background: var(--border); }
  .search-results {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
  }
  .search-result-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 15px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .search-result-item:hover { border-color: var(--accent); background: #1a1c2e; }
  .search-result-title { font-size: .92rem; font-weight: 600; }
  .search-result-sub   { font-size: .78rem; color: var(--muted); margin-top: 4px; }
  .search-result-score { font-size: .7rem; color: #93c5fd; margin-top: 3px; }

  /* ── Search wizard: step 2 ───────────────────────────────────────── */
  .btn-modal-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: .85rem;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }
  .btn-modal-back:hover { text-decoration: underline; }

  .search-step2-info {
    font-size: .82rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .search-step2-lbl {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .9px;
    color: var(--muted);
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <h1>🎵 Music Organizer</h1>
  <div class="stats">
    <span class="stat-chip">✅ <span class="val" id="s-accepted">–</span></span>
    <span class="stat-chip">⏩ <span class="val" id="s-skipped">–</span></span>
    <span class="stat-chip">⏳ <span class="val" id="s-pending">–</span></span>
    <span class="stat-chip">⭐ <span class="val" id="s-playlist">–</span></span>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<!-- ── Card deck ───────────────────────────────────────────────────────── -->
<div class="deck" id="deck">
  <div class="state-screen" id="loading-screen">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>
</div>

<!-- ── Action buttons ──────────────────────────────────────────────────── -->
<div class="actions" id="actions" style="visibility:hidden">
  <button class="btn-action btn-skip"   id="btn-skip"   title="Skip (←)">✕</button>
  <button class="btn-action btn-reset"  id="btn-reset-skipped" title="Re-queue all skipped">↺ skipped</button>
  <button class="btn-action btn-accept" id="btn-accept" title="Accept (→)">✓</button>
  <button class="btn-action btn-star"   id="btn-star"   title="Add to playlist (↑)">⭐</button>
</div>


<!-- ── Manual search modal ─────────────────────────────────────────────── -->
<div class="search-modal-overlay" id="search-modal-overlay">
  <div class="search-modal">
    <h3 id="search-modal-title">🔍 Ricerca manuale</h3>

    <!-- Step 1: inserisci titolo → scegli artista -->
    <div id="search-step-1">
      <div class="search-field">
        <label>Titolo del brano</label>
        <input type="text" id="search-input-title" placeholder="es. It's My Life" />
      </div>
      <div class="search-modal-actions">
        <button class="btn-modal-cancel" id="btn-modal-cancel">Annulla</button>
        <button class="btn-modal-search" id="btn-search-artists">Cerca artisti</button>
      </div>
      <div class="search-results" id="search-artists-list"></div>
    </div>

    <!-- Step 2: scegli album (nascosto finché non si sceglie l'artista) -->
    <div id="search-step-2" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
        <button class="btn-modal-back" id="btn-back-artists">← Cambia artista</button>
        <span class="search-step2-info" id="search-step2-info"></span>
      </div>
      <div class="search-step2-lbl">Scegli l'album</div>
      <div class="search-results" id="search-albums-list"></div>
    </div>
  </div>
</div>

<audio id="player" preload="auto"></audio>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentCard = null;   // { path, best, ... }
let isAnimating  = false;
let audioEl      = document.getElementById('player');

// ── Fetch helpers ──────────────────────────────────────────────────────────

async function api(url, opts = {}) {
  const r = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Progress ───────────────────────────────────────────────────────────────

async function refreshStats() {
  try {
    const s = await api('/api/status');
    document.getElementById('s-accepted').textContent = s.accepted;
    document.getElementById('s-skipped').textContent  = s.skipped;
    document.getElementById('s-pending').textContent  = s.pending;
    document.getElementById('s-playlist').textContent = s.playlist ?? 0;

    const done = s.accepted;
    const total = s.total;
    const pct = total ? (done / total * 100).toFixed(1) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
  } catch (e) { /* ignore */ }
}

// ── Card building ──────────────────────────────────────────────────────────

function buildCard(data) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.path = data.path;

  // swipe labels
  card.innerHTML = `<div class="lbl-accept">ACCEPT</div><div class="lbl-skip">SKIP</div>`;

  // ── Top row: art + badge ────────────────────────────────────────────
  const topRow = document.createElement('div');
  topRow.className = 'card-top-row';

  const art = document.createElement('div');
  art.className = 'art';
  art.innerHTML = '<div class="art-spinner"><div class="spinner"></div></div>';
  topRow.appendChild(art);

  const topMeta = document.createElement('div');
  topMeta.className = 'card-top-meta';

  const best = data.best || {};

  // Async cover art fetch (non-blocking)
  fetchCoverArt(art, best.artist || '', best.album || '', best.release_mbid || '');
  let badgeHtml = '';
  if (best.score != null) {
    const pct = Math.round(best.score * 100);
    badgeHtml = `<span class="badge badge-acoustid">AcoustID ${pct}%</span>`;
  } else if ((data.existing || {}).title || (data.existing || {}).artist) {
    badgeHtml = `<span class="badge badge-existing">Existing tags</span>`;
  } else {
    badgeHtml = `<span class="badge badge-none">No metadata</span>`;
  }
  if (data.is_skipped) {
    const num = (data.candidate_offset || 0) + 1;
    const tot = data.num_candidates || 1;
    const txt = tot > 1 ? `↩ rimandato — suggerimento ${num}/${tot}` : '↩ rimandato';
    badgeHtml += `<span class="badge-was-skipped">${esc(txt)}</span>`;
  }
  topMeta.innerHTML = badgeHtml;
  topRow.appendChild(topMeta);
  card.appendChild(topRow);

  // ── Tags comparison (2-col) ─────────────────────────────────────────
  const ex = data.existing || {};
  const propTitle  = best.title  || ex.title  || data.filename;
  const propArtist = best.artist || ex.artist || '—';
  const propAlbum  = best.album  || ex.album  || '—';

  const compare = document.createElement('div');
  compare.className = 'tags-compare';

  // Original column
  const colOrig = document.createElement('div');
  colOrig.className = 'tags-col tags-col-orig';
  const origHeader = document.createElement('div');
  origHeader.className = 'col-header';
  origHeader.textContent = 'Originali';
  colOrig.appendChild(origHeader);

  for (const [k, v] of [['Title', ex.title||'—'], ['Artist', ex.artist||'—'], ['Album', ex.album||'—']]) {
    const row = document.createElement('div');
    row.className = 'tag-row';
    row.innerHTML = `<span class="k">${k}</span><span class="v" title="${esc(v)}">${esc(v)}</span><button class="copy-btn" title="Copia ${k}">${copyIcon()}</button>`;
    row.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copyText(v, e.currentTarget);
    });
    colOrig.appendChild(row);
  }
  compare.appendChild(colOrig);

  // Proposed column (with copy buttons)
  const colProp = document.createElement('div');
  colProp.className = 'tags-col tags-col-prop';
  colProp.innerHTML = `<div class="col-header">Proposti <button class="btn-manual-search" title="Ricerca manuale tag">🔍</button></div>`;

  for (const [k, v] of [['Title', propTitle], ['Artist', propArtist], ['Album', propAlbum]]) {
    const row = document.createElement('div');
    row.className = 'tag-row';
    row.innerHTML = `<span class="k">${k}</span><span class="v" title="${esc(v)}">${esc(v)}</span><button class="copy-btn" title="Copia ${k}">${copyIcon()}</button>`;
    row.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copyText(v, e.currentTarget);
    });
    colProp.appendChild(row);
  }

  compare.appendChild(colProp);

  // wire manual search button
  colProp.querySelector('.btn-manual-search').addEventListener('click', (e) => {
    e.stopPropagation();
    openSearchModal();
  });

  card.appendChild(compare);

  // ── Original path ───────────────────────────────────────────────────
  const pathFrom = document.createElement('div');
  pathFrom.className = 'path-row path-original';
  pathFrom.innerHTML = `<span class="path-lbl">Da</span><span class="path-val" title="${esc(data.path)}">${esc(data.path)}</span><button class="copy-btn" title="Copia path originale">${copyIcon()}</button>`;
  pathFrom.querySelector('.copy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    copyText(data.path, e.currentTarget);
  });
  card.appendChild(pathFrom);

  // ── Proposed path ───────────────────────────────────────────────────
  const destFull = data.dest_full || data.dest_preview || '—';
  const pathTo = document.createElement('div');
  pathTo.className = 'path-row path-proposed';
  pathTo.innerHTML = `<span class="path-lbl">A</span><span class="path-val" title="${esc(destFull)}">${esc(destFull)}</span><button class="copy-btn" title="Copia path">${copyIcon()}</button>`;
  pathTo.querySelector('.copy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    copyText(destFull, e.currentTarget);
  });
  card.appendChild(pathTo);

  // spacer
  card.appendChild(Object.assign(document.createElement('div'), { className: 'flex-spacer' }));

  // player bar
  const playerBar = document.createElement('div');
  playerBar.className = 'player-bar';
  playerBar.innerHTML = `
    <button class="play-btn" id="play-btn-inner" title="Play/pause (Space)">▶</button>
    <div class="waveform-wrap">
      <input type="range" class="audio-seek" id="audio-seek-inner" value="0" min="0" max="100" step="0.1" />
      <div class="audio-time" id="audio-time-inner">0:00 / 0:00</div>
    </div>
  `;
  card.appendChild(playerBar);

  // wire player events after appending
  setTimeout(() => {
    const pbtn = card.querySelector('#play-btn-inner');
    const seek  = card.querySelector('#audio-seek-inner');
    const time  = card.querySelector('#audio-time-inner');

    if (pbtn) pbtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(data.path, pbtn); });
    if (seek) seek.addEventListener('input', (e) => {
      e.stopPropagation();
      if (audioEl.duration) audioEl.currentTime = audioEl.duration * (seek.value / 100);
    });

    audioEl.ontimeupdate = () => {
      if (!audioEl.duration) return;
      const pct = audioEl.currentTime / audioEl.duration * 100;
      if (seek) seek.value = pct;
      if (time) time.textContent = `${fmt(audioEl.currentTime)} / ${fmt(audioEl.duration)}`;
    };
    audioEl.onended = () => {
      if (pbtn) pbtn.textContent = '▶';
    };
  }, 0);

  // swipe gesture
  attachSwipe(card);

  return card;
}

// ── Load next card ─────────────────────────────────────────────────────────

async function loadNext() {
  if (isAnimating) return;
  setActionsVisible(false);
  stopAudio();

  const deck = document.getElementById('deck');
  deck.innerHTML = `<div class="state-screen"><div class="spinner"></div><p>Analyzing…</p></div>`;

  try {
    const data = await api('/api/next');
    deck.innerHTML = '';

    if (data.done) {
      deck.innerHTML = `
        <div class="state-screen">
          <div class="icon">🎉</div>
          <h2>All done!</h2>
          <p>Every track has been reviewed. You can reset skipped songs to review them again.</p>
        </div>`;
      setActionsVisible(false);
      document.getElementById('btn-reset-skipped').style.display = 'flex';
      refreshStats();
      return;
    }

    currentCard = data;
    const card = buildCard(data);
    deck.appendChild(card);
    setActionsVisible(true);

    // auto-play
    playAudio(data.path);
    refreshStats();
  } catch (err) {
    deck.innerHTML = `<div class="state-screen"><div class="icon">⚠️</div><h2>Error</h2><p>${esc(String(err))}</p></div>`;
  }
}

// ── Actions ────────────────────────────────────────────────────────────────

async function doAccept() {
  if (!currentCard || isAnimating) return;
  isAnimating = true;
  stopAudio();

  const card = document.querySelector('.card');
  if (card) card.classList.add('fly-right');

  await sleep(360);
  setActionsVisible(false);
  document.getElementById('deck').innerHTML = `<div class="state-screen"><div class="spinner"></div><p>Analyzing\u2026</p></div>`;

  try {
    await api('/api/accept', {
      method: 'POST',
      body: JSON.stringify({ path: currentCard.path, choice: currentCard.best || {} }),
    });
  } catch (e) { console.warn(e); }

  isAnimating = false;
  currentCard = null;
  loadNext();
}

async function doSkip() {
  if (!currentCard || isAnimating) return;
  isAnimating = true;
  stopAudio();

  const card = document.querySelector('.card');
  if (card) card.classList.add('fly-left');

  await sleep(360);
  setActionsVisible(false);
  document.getElementById('deck').innerHTML = `<div class="state-screen"><div class="spinner"></div><p>Analyzing\u2026</p></div>`;

  try {
    await api('/api/skip', {
      method: 'POST',
      body: JSON.stringify({ path: currentCard.path }),
    });
  } catch (e) { console.warn(e); }

  isAnimating = false;
  currentCard = null;
  loadNext();
}

async function doStar() {
  if (!currentCard || isAnimating) return;
  isAnimating = true;
  stopAudio();

  // burst animation on the button
  const starBtn = document.getElementById('btn-star');
  if (starBtn) {
    starBtn.classList.remove('burst');
    void starBtn.offsetWidth; // reflow to restart animation
    starBtn.classList.add('burst');
  }

  const card = document.querySelector('.card');
  if (card) card.classList.add('fly-up');

  await sleep(410);
  setActionsVisible(false);
  document.getElementById('deck').innerHTML = `<div class="state-screen"><div class="spinner"></div><p>Analyzing\u2026</p></div>`;

  try {
    await api('/api/star', {
      method: 'POST',
      body: JSON.stringify({ path: currentCard.path, choice: currentCard.best || {} }),
    });
  } catch (e) { console.warn(e); }

  isAnimating = false;
  currentCard = null;
  loadNext();
}

// ── Swipe gesture ──────────────────────────────────────────────────────────

function attachSwipe(card) {
  let startX = 0, startY = 0, dx = 0, dragging = false;

  function onStart(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    dragging = true;
    card.style.transition = 'none';
  }

  function onMove(e) {
    if (!dragging) return;
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    dx = cx - startX;
    const dy = cy - startY;
    const rot = dx * 0.08;
    card.style.transform = `translateX(${dx}px) translateY(${dy * 0.3}px) rotate(${rot}deg)`;

    const ratio = Math.abs(dx) / 80;
    const capped = Math.min(ratio, 1);
    card.querySelector('.lbl-accept').style.opacity = dx > 0 ? capped : 0;
    card.querySelector('.lbl-skip').style.opacity   = dx < 0 ? capped : 0;
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    card.style.transition = 'transform .35s ease, opacity .35s';
    card.querySelector('.lbl-accept').style.opacity = 0;
    card.querySelector('.lbl-skip').style.opacity   = 0;

    if (dx > 80) {
      doAccept();
    } else if (dx < -80) {
      doSkip();
    } else {
      card.style.transform = '';
    }
    dx = 0;
  }

  card.addEventListener('mousedown',  onStart);
  card.addEventListener('mousemove',  onMove);
  card.addEventListener('mouseup',    onEnd);
  card.addEventListener('mouseleave', onEnd);
  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchmove',  onMove,  { passive: true });
  card.addEventListener('touchend',   onEnd);
}

// ── Audio ──────────────────────────────────────────────────────────────────

function playAudio(path) {
  audioEl.src = '/api/audio?path=' + encodeURIComponent(path);
  audioEl.currentTime = 0;
  audioEl.play().catch(() => {});
  const pbtn = document.getElementById('play-btn-inner');
  if (pbtn) pbtn.textContent = '⏸';
}

function stopAudio() {
  audioEl.pause();
  audioEl.src = '';
  const pbtn = document.getElementById('play-btn-inner');
  if (pbtn) pbtn.textContent = '▶';
}

function togglePlay(path, btn) {
  if (audioEl.paused) {
    if (!audioEl.src || !audioEl.src.includes(encodeURIComponent(path))) {
      audioEl.src = '/api/audio?path=' + encodeURIComponent(path);
      audioEl.currentTime = 0;
    }
    audioEl.play().catch(() => {});
    btn.textContent = '⏸';
  } else {
    audioEl.pause();
    btn.textContent = '▶';
  }
}

// ── Keyboard ───────────────────────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { e.preventDefault(); doAccept(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); doSkip(); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); doStar(); }
  if (e.key === ' ')          { e.preventDefault(); spaceToggle(); }
});

function spaceToggle() {
  if (!currentCard) return;
  const pbtn = document.getElementById('play-btn-inner');
  if (pbtn) togglePlay(currentCard.path, pbtn);
}

// ── Reset skipped ──────────────────────────────────────────────────────────

document.getElementById('btn-reset-skipped').addEventListener('click', async () => {
  await api('/api/reset_skipped', { method: 'POST', body: '{}' });
  loadNext();
});

document.getElementById('btn-accept').addEventListener('click', doAccept);
document.getElementById('btn-skip').addEventListener('click', doSkip);
document.getElementById('btn-star').addEventListener('click', doStar);

// ── Helpers ────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function copyIcon() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
}

async function copyText(text, btn) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 1500);
  } catch (e) {
    console.warn('Copy failed', e);
  }
}

function fmt(secs) {
  if (!isFinite(secs)) return '0:00';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setActionsVisible(v) {
  document.getElementById('actions').style.visibility = v ? 'visible' : 'hidden';
}

// ── Manual search modal (wizard: titolo → artista → album) ────────────────

let _searchTitle = '';

function openSearchModal() {
  if (!currentCard) return;
  _searchTitle = '';
  document.getElementById('search-input-title').value = '';
  document.getElementById('search-artists-list').innerHTML = '';
  document.getElementById('search-modal-title').textContent = '🔍 Ricerca manuale';
  document.getElementById('search-step-1').style.display = '';
  document.getElementById('search-step-2').style.display = 'none';
  document.getElementById('search-modal-overlay').classList.add('open');
  document.getElementById('search-input-title').focus();
}

function closeSearchModal() {
  document.getElementById('search-modal-overlay').classList.remove('open');
}

// Step 1: cerca artisti per titolo
async function doSearchArtists() {
  const title = document.getElementById('search-input-title').value.trim();
  if (!title) return;
  _searchTitle = title;

  const resList = document.getElementById('search-artists-list');
  resList.innerHTML = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:8px">Ricerca in corso…</div>';

  try {
    const data = await api('/api/search_artists', {
      method: 'POST',
      body: JSON.stringify({ title }),
    });
    renderArtistResults(data.artists || []);
  } catch (e) {
    resList.innerHTML = `<div style="color:var(--skip);font-size:.82rem;padding:4px">Errore: ${esc(String(e))}</div>`;
  }
}

function renderArtistResults(artists) {
  const resList = document.getElementById('search-artists-list');
  if (!artists.length) {
    resList.innerHTML = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:8px">Nessun artista trovato.</div>';
    return;
  }
  resList.innerHTML = '';
  for (const a of artists) {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `<div class="search-result-title">${esc(a.name)}</div>`;
    item.addEventListener('click', () => selectArtist(a));
    resList.appendChild(item);
  }
}

// Step 2: seleziona artista → carica album
async function selectArtist(artist) {
  document.getElementById('search-step-1').style.display = 'none';
  document.getElementById('search-modal-title').textContent = '🎵 Scegli l\'album';
  document.getElementById('search-step2-info').textContent = `${artist.name}  —  "${_searchTitle}"`;
  document.getElementById('search-step-2').style.display = '';

  const resList = document.getElementById('search-albums-list');
  resList.innerHTML = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:8px">Carico album…</div>';

  try {
    const data = await api('/api/search_albums', {
      method: 'POST',
      body: JSON.stringify({ title: _searchTitle, artist: artist.name }),
    });
    renderAlbumResults(data.albums || [], artist.name);
  } catch (e) {
    resList.innerHTML = `<div style="color:var(--skip);font-size:.82rem;padding:4px">Errore: ${esc(String(e))}</div>`;
  }
}

function renderAlbumResults(albums, artistName) {
  const resList = document.getElementById('search-albums-list');
  if (!albums.length) {
    resList.innerHTML = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:8px">Nessun album trovato.</div>';
    return;
  }
  resList.innerHTML = '';
  for (const a of albums) {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    const yearStr = a.year  ? ` (${a.year})` : '';
    const typeStr = a.primary_type ? ` · ${a.primary_type}` : '';
    item.innerHTML = `
      <div class="search-result-title">${esc(a.album || '—')}</div>
      <div class="search-result-sub">${esc(artistName)}${yearStr}${typeStr}</div>
    `;
    item.addEventListener('click', () => applySearchResult(a));
    resList.appendChild(item);
  }
}

function backToArtists() {
  document.getElementById('search-step-2').style.display = 'none';
  document.getElementById('search-modal-title').textContent = '🔍 Ricerca manuale';
  document.getElementById('search-step-1').style.display = '';
}

function applySearchResult(candidate) {
  if (!currentCard) return;
  currentCard.best = { ...candidate };

  // Update proposed column in the active card
  const card = document.querySelector('.card');
  if (card) {
    const colProp = card.querySelector('.tags-col-prop');
    if (colProp) {
      const pairs = [['Title', candidate.title || '—'], ['Artist', candidate.artist || '—'], ['Album', candidate.album || '—']];
      const rows = colProp.querySelectorAll('.tag-row');
      pairs.forEach(([k, v], i) => {
        if (!rows[i]) return;
        const span = rows[i].querySelector('.v');
        if (span) { span.textContent = v; span.title = v; }
        const btn = rows[i].querySelector('.copy-btn');
        if (btn) btn.onclick = (e) => { e.stopPropagation(); copyText(v, btn); };
      });
    }
    // Update proposed path (client-side approximation)
    const pathVal = card.querySelector('.path-row.path-proposed .path-val');
    if (pathVal) {
      const ext = currentCard.filename ? currentCard.filename.slice(currentCard.filename.lastIndexOf('.')) : '';
      const preview = [candidate.artist || 'Unknown Artist', candidate.album || 'Unknown Album', (candidate.title || currentCard.filename) + ext].join('/');
      pathVal.textContent = preview;
      pathVal.title = preview;
    }
    // Refresh cover art with new tags
    const artEl = card.querySelector('.art');
    if (artEl) {
      artEl.innerHTML = '<div class="art-spinner"><div class="spinner"></div></div>';
      fetchCoverArt(artEl, candidate.artist || '', candidate.album || '', candidate.release_mbid || '');
    }
  }

  closeSearchModal();
}

// ── Cover art fetch ────────────────────────────────────────────────────────────────────

async function fetchCoverArt(artEl, artist, album, mbid) {
  if (!artEl) return;
  const params = new URLSearchParams();
  if (mbid)   params.set('mbid',   mbid);
  if (artist) params.set('artist', artist);
  if (album)  params.set('album',  album);
  if (!params.toString()) {
    artEl.textContent = '🎵';
    return;
  }
  try {
    const data = await api('/api/cover_art?' + params.toString());
    if (data.url) {
      const img = document.createElement('img');
      img.alt = 'cover';
      img.onerror = () => { artEl.textContent = '🎵'; };
      img.onload  = () => { artEl.innerHTML = ''; artEl.appendChild(img); };
      img.src = data.url;
    } else {
      artEl.textContent = '🎵';
    }
  } catch (e) {
    artEl.textContent = '🎵';
  }
}

// Wire modal buttons
document.getElementById('btn-modal-cancel').addEventListener('click', closeSearchModal);
document.getElementById('btn-search-artists').addEventListener('click', doSearchArtists);
document.getElementById('btn-back-artists').addEventListener('click', backToArtists);
document.getElementById('search-modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeSearchModal();
});
document.getElementById('search-input-title').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearchArtists(); });

// ── Boot ───────────────────────────────────────────────────────────────────

refreshStats();
loadNext();
</script>
